# Decap CMS — edit `repo` + `branch` to match your GitHub repo (see DECAP_SETUP.md)
# For local editing without GitHub: run `npm run cms` in a second terminal (with `local_backend: true` below).

backend:
  name: github
  repo: clavinohou/portfolio
  branch: main

# Uncomment for local development (run `npm run cms` alongside `npm run dev`):
local_backend: true

media_folder: public/uploads
public_folder: /uploads

site_url: https://calvinhou.com
# If GitHub Pages uses a project URL, set e.g. https://YOUR_USERNAME.github.io/YOUR_REPO_NAME/
# And set the same in vite.config.js `base`

# Show a live preview pane beside the editor for collections that opt in.
editor:
  preview: true

# —— Collections ——————————————————————————————————————————————————————————
# Three top-level collections, each with its own "New" button in the sidebar:
#
#   1. Projects       — one JSON file per project      (src/content/cms/projects/*.json)
#   2. Build Log      — one JSON file per blog entry   (src/content/cms/blog/*.json)
#   3. Site settings  — single file for the bits you rarely touch
#
# Projects and Build Log are folder collections, so creating a new one is just
# "click the + button → fill in the form → Save". Under the hood Decap writes
# `src/content/cms/<collection>/<slug>.json` and Vite's import.meta.glob picks
# it up on the next build (or HMR reload in dev).
collections:
  # ————————————————————————— PROJECTS ——————————————————————————
  - name: projects
    label: Projects
    label_singular: Project
    description: >-
      One file per project. Click “New Project” to add one — the filename
      will match the ID slug you enter below. Projects show up on the
      oscilloscope “PROJECTS” channel AND on the Build Log site at /log.
    folder: src/content/cms/projects
    create: true
    format: json
    extension: json
    slug: '{{fields.id}}'
    identifier_field: title
    summary: '{{title}}  ·  {{sortOrder}}'
    sortable_fields: ['sortOrder', 'title', 'date']
    view_groups:
      - label: By pinned date
        field: sortOrder
        pattern: '\d{4}'
    fields:
      - {
          label: ID (URL slug),
          name: id,
          widget: string,
          pattern: ['^[a-z0-9][a-z0-9-]*$', 'Use lowercase letters, numbers, and dashes only — e.g. my-cool-project'],
          hint: 'This becomes the filename and the URL (/log/<id>). Lowercase, dashes only. DO NOT change this after a project is published or external links will break.',
        }
      - { label: Title, name: title, widget: string }
      - {
          label: Pinned date (sort key),
          name: sortOrder,
          widget: datetime,
          format: 'YYYY-MM-DDTHH:mm',
          date_format: 'YYYY-MM-DD',
          time_format: 'HH:mm',
          picker_utc: false,
          required: false,
          hint: 'Projects show newest-first using this value. New entries default to right now, so they land at the top automatically. To bump an old project back to the front, just edit this field and press "Now" — no need to renumber anything else.',
        }
      - {
          label: Date,
          name: date,
          widget: string,
          required: false,
          hint: 'Free-form, e.g. 2024, Spring 2025, or Jan 2024 – Mar 2025.',
        }
      - {
          label: External link,
          name: link,
          widget: string,
          required: false,
          hint: 'Optional — full URL to the project (GitHub repo, live site, etc.). Leave empty if there isn’t one.',
        }
      - {
          label: Show on Build Log site,
          name: showInBuildLog,
          widget: boolean,
          default: true,
          hint: 'ON (default) → project appears on the Build Log at /log and clicking the card on the portfolio opens its build log page. OFF → project only shows on the portfolio; the card becomes a link to the External URL above (or non-clickable if none). Use OFF for older projects that predate the build log.',
        }
      - label: Tags
        name: tags
        widget: list
        required: false
        summary: '{{fields.tag}}'
        hint: 'Short keywords shown as pills on the project card.'
        fields:
          - { label: Tag, name: tag, widget: string }
      - {
          label: Short summary,
          name: summary,
          widget: text,
          required: false,
          hint: 'The short blurb shown on the oscilloscope PROJECTS card. Keep it to 1–2 sentences — plain text, no markdown. Leave blank to reuse the long description below.',
        }
      - {
          label: Description (Markdown),
          name: description,
          widget: markdown,
          hint: 'Long-form description shown on the Build Log project page (/log/<id>). Supports bold, lists, links, code blocks, etc.',
        }
      - {
          label: Cover image,
          name: imageUrl,
          widget: image,
          required: false,
          choose_url: true,
          hint: 'Main thumbnail — shown first in the carousel. Upload or pick from existing uploads.',
        }
      - label: Gallery / additional photos
        name: gallery
        widget: list
        required: false
        summary: '{{fields.src}}'
        hint: 'Extra photos rotated in the image stack after the cover image.'
        fields:
          - {
              label: Image,
              name: src,
              widget: image,
              choose_url: true,
            }
      - {
          label: Visible images on portfolio card,
          name: stackSize,
          widget: number,
          value_type: int,
          min: 1,
          max: 8,
          required: false,
          hint: 'Shown on the oscilloscope PROJECTS card (calvinhou.com). That card is narrow and sits next to a short summary, so 1–3 images usually looks best. Leave blank to show all.',
        }
      - {
          label: Visible images on Build Log page,
          name: buildLogStackSize,
          widget: number,
          value_type: int,
          min: 1,
          max: 8,
          required: false,
          hint: 'Shown on the Build Log project page (/log/<id>). That hero is taller (sits next to the long description), so 3–5 images usually looks best. Leave blank to reuse the portfolio card value above, or fall back to showing all.',
        }

  # ————————————————————————— BUILD LOG —————————————————————————
  - name: blog
    label: Build log entries
    label_singular: Build log entry
    description: >-
      One file per build log entry. Each entry attaches to one project via
      the “Related project” field and appears on that project’s page at
      /log/<project-id>. Newest first. Keep entries small and frequent —
      notes-to-self, failures, breakthroughs, calculations that held up.
    folder: src/content/cms/blog
    create: true
    format: json
    extension: json
    slug: '{{fields.id}}'
    identifier_field: title
    summary: '{{title}}  ·  {{project}}  ·  {{date}}'
    sortable_fields: ['date', 'project', 'title']
    view_groups:
      - label: By project
        field: project
      - label: By year
        field: date
        pattern: '\d{4}'
    view_filters:
      - label: This year
        field: date
        pattern: '2026'
      - label: Last year
        field: date
        pattern: '2025'
    fields:
      - {
          label: ID (URL slug),
          name: id,
          widget: string,
          pattern: ['^[a-z0-9][a-z0-9-]*$', 'Use lowercase letters, numbers, and dashes only — e.g. climber-v3-tuning'],
          hint: 'Stable slug for the filename. Lowercase, dashes only. Not shown on the site but visible in git.',
        }
      - { label: Title, name: title, widget: string, hint: 'The headline for this entry. Keep it punchy.' }
      - {
          label: Date / time,
          name: date,
          widget: datetime,
          format: 'YYYY-MM-DDTHH:mm',
          date_format: 'YYYY-MM-DD',
          time_format: 'HH:mm',
          picker_utc: false,
          hint: 'When the entry was written. Used for chronological ordering.',
        }
      - {
          label: Related project,
          name: project,
          widget: relation,
          collection: projects,
          search_fields: [title, id],
          display_fields: [title],
          value_field: id,
          required: true,
          hint: 'Pick the project this entry belongs to. The entry will appear on that project’s /log/<id> page.',
        }
      - {
          label: One-line summary,
          name: summary,
          widget: text,
          required: false,
          hint: 'Italicized blurb shown right under the title. Think: TL;DR in one sentence.',
        }
      - label: Tags
        name: tags
        widget: list
        required: false
        summary: '{{fields.tag}}'
        fields:
          - { label: Tag, name: tag, widget: string }
      - {
          label: Body (Markdown),
          name: body,
          widget: markdown,
          hint: 'The actual entry. Supports bold, lists, headings, fenced code blocks, quotes, links, etc.',
        }
      - label: Photos / diagrams
        name: gallery
        widget: list
        required: false
        summary: '{{fields.src}}'
        hint: 'Scope captures, whiteboard photos, sketches, CAD screenshots — anything that tells the story.'
        fields:
          - {
              label: Image,
              name: src,
              widget: image,
              choose_url: true,
            }
      - {
          label: Visible images on Build Log entry,
          name: stackSize,
          widget: number,
          value_type: int,
          min: 1,
          max: 8,
          required: false,
          hint: 'How many images show in the stack on this entry. Leave blank to show all.',
        }

  # ————————————————————————— SITE SETTINGS —————————————————————————
  - name: site
    label: Site settings
    description: >-
      The stuff you set once and rarely touch: profile / about, experience,
      social links, resume. New projects and build log entries live in their
      own collections above — use those instead of editing this file.
    files:
      - label: Site data (profile, experience, links, resume)
        name: site
        file: src/content/cms/site.json
        format: json
        fields:
          - label: Profile
            name: profile
            widget: object
            collapsed: false
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Title / headline, name: title, widget: string }
              - {
                  label: Scope brief (CRT subtitle text),
                  name: scopeBrief,
                  widget: text,
                  required: false,
                }
              - { label: School, name: school, widget: string }
              - { label: Location, name: location, widget: string }
              - { label: Year, name: year, widget: string }
              - label: Interests
                name: interests
                widget: list
                summary: '{{fields.interest}}'
                fields:
                  - { label: Interest, name: interest, widget: string }
              - label: About paragraphs
                name: about
                widget: list
                summary: '{{fields.paragraph}}'
                fields:
                  - { label: Paragraph (Markdown), name: paragraph, widget: markdown }
          - label: Experience
            name: experience
            widget: list
            summary: '{{fields.title}} — {{fields.company}}'
            hint: 'Jobs, internships, and clubs. Shown on the EXPERIENCE channel.'
            fields:
              - { label: ID (slug), name: id, widget: string }
              - { label: Type, name: type, widget: string, hint: 'e.g. Internship, Club, Externship' }
              - { label: Title, name: title, widget: string }
              - { label: Company, name: company, widget: string }
              - { label: Location, name: location, widget: string }
              - { label: Date, name: date, widget: string }
              - { label: Description (Markdown), name: description, widget: markdown }
              - label: Tags
                name: tags
                widget: list
                required: false
                fields:
                  - { label: Tag, name: tag, widget: string }
              - label: Photos (carousel)
                name: gallery
                widget: list
                required: false
                summary: '{{fields.src}}'
                fields:
                  - {
                      label: Image,
                      name: src,
                      widget: image,
                      choose_url: true,
                      hint: 'Logos, team photos, or work samples.',
                    }
              - {
                  label: Visible images in stack,
                  name: stackSize,
                  widget: number,
                  value_type: int,
                  min: 1,
                  max: 8,
                  required: false,
                }
          - label: Links & social
            name: links
            widget: object
            fields:
              - { label: Email, name: email, widget: string }
              - { label: GitHub URL, name: github, widget: string }
              - { label: LinkedIn URL, name: linkedin, widget: string }
              - { label: Instagram URL, name: instagram, widget: string }
          - label: Resume
            name: resume
            widget: object
            fields:
              - { label: Download button label, name: downloadLabel, widget: string }
              - {
                  label: Resume PDF,
                  name: downloadUrl,
                  widget: file,
                  choose_url: true,
                  hint: 'Upload a PDF or keep a path like /resume/CalvinHouResume.pdf',
                }
              - {
                  label: Last updated,
                  name: lastUpdated,
                  widget: string,
                  required: false,
                  hint: 'Set automatically when you change the PDF (YYYY-MM-DD). You can edit if needed.',
                }
              - { label: '', name: internalPrevUrl, widget: hidden, default: '' }
              - label: Highlight bullets
                name: highlights
                widget: list
                fields:
                  - { label: Highlight, name: highlight, widget: string }
